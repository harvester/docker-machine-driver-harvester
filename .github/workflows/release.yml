name: CI Workflow

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Build
        run: |
          make ci

      - name: Upload artifacts
        if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/master')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: artifact
          path: ./dist/artifacts/*

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} --draft --notes "Draft release for ${{ github.ref_name }}"
          gh release upload ${{ github.ref_name }} "${PWD}/dist/artifacts"/*

  publish-gcp:
    name: Publish artifacts to GCP
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/master')
    permissions:
      contents: read
      id-token: write  # for reading credential https://github.com/rancher-eio/read-vault-secrets
    steps:

    - name: Checkout code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

    - name: Download artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
      with:
        name: artifact
        path: ./dist/artifacts/

    - name: Read Secrets
      uses: rancher-eio/read-vault-secrets@d266f55186f80a893839f6e15662e67388e443e6  # main
      with:
        secrets: |
          secret/data/github/repo/${{ github.repository }}/google-auth/harvester/credentials token | GOOGLE_AUTH ;

    - name: Login to Google Cloud
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
      with:
        credentials_json: '${{ env.GOOGLE_AUTH }}'

    - name: Publish master
      uses: google-github-actions/upload-cloud-storage@c0f6160ff80057923ff50e5e567695cea181ec23  # v2
      if: startsWith(github.ref, 'refs/heads/master')
      with:
        path: dist/artifacts
        parent: false
        destination: releases.rancher.com/harvester-node-driver/master
        predefinedAcl: publicRead
        headers: |-
          cache-control: public,no-cache,proxy-revalidate

    - name: Publish tag
      uses: google-github-actions/upload-cloud-storage@c0f6160ff80057923ff50e5e567695cea181ec23  # v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        path: dist/artifacts
        parent: false
        destination: releases.rancher.com/harvester-node-driver/${{ github.ref_name }}
        predefinedAcl: publicRead
        headers: |-
          cache-control: public,no-cache,proxy-revalidate
